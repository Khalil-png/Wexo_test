
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wixo Social</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wixo">
    <link rel="apple-touch-icon" href="/icon.png">
    
    <meta name="theme-color" content="#0f0f0f">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f0f0f;
            --text-main: #ffffff;
        }
        
        html {
            background-color: var(--bg-main);
            scroll-behavior: smooth;
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            -webkit-overflow-scrolling: touch;
        }

        #root {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .loader-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { font-family: monospace; font-size: 14px; color: #666; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="root">
        <div class="loader-container">
            <div class="loader">WIXO_BOOTING...</div>
            <div id="debug-log" style="font-size:10px;color:#444;margin-top:10px;font-family:monospace;"></div>
        </div>
    </div>

    <script>
        window.__APP_MOUNTED__ = false;

        // Diagnostic logger
        async function logToServer(level, message, details) {
            try {
                fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, message, details, timestamp: new Date().toISOString() })
                }).catch(() => {});
            } catch (e) {}
        }
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
