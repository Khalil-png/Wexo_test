
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wexo Social</title>
    <link rel="icon" type="image/png" href="http://192.168.1.147:9090/api/files/pbc_2708086759/ckb6419uqwto8h0/w_1_removebg_preview_1_vbjej008kd.png?token=">
    <meta name="theme-color" content="#0f0f0f">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f0f0f;
            --text-main: #ffffff;
        }
        
        html {
            background-color: var(--bg-main);
            scroll-behavior: smooth;
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            -webkit-overflow-scrolling: touch;
        }

        #root {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .loader-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { font-family: monospace; font-size: 14px; color: #666; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="root">
        <div class="loader-container">
            <div class="loader">WEXO_BOOTING...</div>
            <div id="debug-log" style="font-size:10px;color:#444;margin-top:10px;font-family:monospace;"></div>
            <button onclick="clearSW()" style="margin-top:20px; padding:8px 16px; font-size:10px; background:#1a1a1a; color:#888; border:1px solid #333; cursor:pointer; border-radius:8px; font-weight:bold;">FORCE_CLEANUP</button>
        </div>
    </div>

    <script>
        function clearSW() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) registration.unregister();
                    window.location.reload(true);
                });
            } else {
                window.location.reload(true);
            }
        }
    </script>
    
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; padding:40px; font-family:monospace; z-index:9999; overflow:auto;">
        <h1 style="color:red; margin-bottom:20px;">CRITICAL_RUNTIME_ERROR</h1>
        <pre id="error-stack" style="white-space:pre-wrap;"></pre>
        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px 20px; background:white; color:black; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">RELOAD_APP</button>
    </div>

    <script>
        window.__APP_MOUNTED__ = false;

        // Force unregister all service workers to avoid "Gray Screen" caching bugs
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service Worker unregistered');
                }
            });
        }

        let isLogging = false;
        async function logToServer(level, message, details) {
            if (isLogging) return;
            isLogging = true;
            try {
                await fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, message, details })
                });
            } catch (e) {
                // Don't use console.log here to avoid recursion
            } finally {
                isLogging = false;
            }
        }

        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errorInfo = `Message: ${msg}\nUrl: ${url}\nLine: ${lineNo}\nColumn: ${columnNo}\nStack: ${error ? error.stack : 'N/A'}`;
            logToServer('ERROR', msg, errorInfo);
            
            const overlay = document.getElementById('error-overlay');
            const stack = document.getElementById('error-stack');
            if (overlay && stack) {
                overlay.style.display = 'block';
                stack.innerText = errorInfo;
            }
            return false;
        };

        window.onunhandledrejection = function(event) {
            const reason = event.reason;
            const stack = reason && reason.stack ? reason.stack : 'N/A';
            logToServer('PROMISE_REJECTION', String(reason), { stack });
            
            const overlay = document.getElementById('error-overlay');
            const stackEl = document.getElementById('error-stack');
            if (overlay && stackEl) {
                overlay.style.display = 'block';
                stackEl.innerText = `Promise Rejection: ${reason}\n\nStack:\n${stack}`;
            }
        };

        // Rediriger les console.log vers le serveur pour debug
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            logToServer('INFO', args.join(' '));
        };

        setTimeout(() => {
            if (!window.__APP_MOUNTED__) {
                const msg = 'L\'application ne s\'est pas chargée après 15 secondes.';
                logToServer('WARNING', msg);
                document.getElementById('root').innerHTML = `<div style="color:red;padding:20px;">${msg}<br/>Vérifiez le terminal.</div>`;
            }
        }, 15000);
    </script>
    <script type="module" src="/index.tsx" onerror="document.getElementById('root').innerHTML='<div style=color:red>SCRIPT_LOADING_ERROR: index.tsx failed</div>'"></script>
</body>
</html>
