
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wexo Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #020617;
        }
        
        html {
            background-color: var(--slate-950);
            scroll-behavior: smooth;
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--slate-950);
            color: #f8fafc;
            /* Scroll global fluide */
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            -webkit-overflow-scrolling: touch;
        }

        #root {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .page-transition {
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .animate-marquee {
            animation: marquee 10s linear infinite;
        }

        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hack pour les navigateurs mobiles pour éviter que l'UI du navigateur ne cache le bas */
        .min-h-screen-custom {
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* Custom Range Input Styling for Volume Slider */
        .volume-slider {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 999px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            margin-top: -6px; /* Center thumb on a 4px track */
        }

        .volume-slider::-moz-range-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        /* Progress Slider Styling */
        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            outline: none;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-slider:hover::-webkit-slider-thumb {
            opacity: 1;
        }

        .progress-slider::-moz-range-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            border: none;
        }

        .progress-slider:hover::-moz-range-thumb {
            opacity: 1;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <script>
      // OAuth Callback Handler for AI Studio Preview
      if (window.location.pathname === '/auth/callback' || window.location.pathname === '/auth/callback/') {
        if (window.opener) {
          window.opener.postMessage({ type: 'OAUTH_AUTH_SUCCESS' }, '*');
          window.close();
        } else {
          window.location.href = '/';
        }
        // Stop further execution to avoid loading the full app in the popup
        window.stop();
      }
    </script>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
