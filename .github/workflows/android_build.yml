name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permet de lancer le build manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor
        run: |
          # Create capacitor.config.json if it doesn't exist
          if [ ! -f capacitor.config.json ]; then
            echo '{"appId": "com.wexo.app", "appName": "Wexo", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json
          fi
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Wexo-Mobile-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
